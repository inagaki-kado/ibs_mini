<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYER STATS | 板橋ベイブレード会</title>
<link rel="icon" href="BEYX_logo_amb.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ─── ROOT VARS (index.html と統一) ─── */
:root {
  --bg: #04070f;
  --bg2: #080d1a;
  --bg3: #0c1220;
  --neon-green:  #00ff88;
  --neon-blue:   #0ea5e9;
  --neon-pink:   #ec4899;
  --neon-yellow: #facc15;
  --neon-orange: #f97316;
  --neon-red:    #ef4444;
  --neon-white:  #e2e8f0;
  --text:     #e2e8f0;
  --text-dim: #94a3b8;
  --border:   rgba(0,255,136,0.2);
  --glow-green:  0 0 20px rgba(0,255,136,0.5),  0 0 60px rgba(0,255,136,0.25);
  --glow-blue:   0 0 20px rgba(14,165,233,0.5),  0 0 60px rgba(14,165,233,0.25);
  --glow-pink:   0 0 20px rgba(236,72,153,0.5),  0 0 60px rgba(236,72,153,0.25);
  --glow-yellow: 0 0 20px rgba(250,204,21,0.5),  0 0 60px rgba(250,204,21,0.25);
  --glow-orange: 0 0 20px rgba(249,115,22,0.5),  0 0 60px rgba(249,115,22,0.25);
  --glow-white:  0 0 20px rgba(226,232,240,0.5), 0 0 60px rgba(226,232,240,0.25);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}

/* scanline */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
  pointer-events: none; z-index: 9999;
}

/* grid bg */
.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}

/* ─── NAV ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.8rem 2rem;
  background: rgba(4,7,15,0.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Orbitron', monospace; font-weight: 900; font-size: 1rem;
  color: var(--neon-green); text-shadow: var(--glow-green);
  text-decoration: none; letter-spacing: 0.05em;
}
.nav-links { display: flex; gap: 1.6rem; list-style: none; }
.nav-links a {
  font-family: 'Rajdhani', sans-serif; font-weight: 600;
  font-size: 0.88rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-dim); text-decoration: none;
  transition: color 0.2s, text-shadow 0.2s;
}
.nav-links a:hover, .nav-links a.active {
  color: var(--neon-green); text-shadow: var(--glow-green);
}
@media (max-width: 640px) { .nav-links { display: none; } }

/* ─── MAIN LAYOUT ─── */
.page-wrap {
  position: relative; z-index: 1;
  min-height: 100vh;
  padding-top: 64px;
  display: grid;
  grid-template-columns: 340px 1fr;
  grid-template-rows: auto 1fr;
}

.page-header {
  grid-column: 1 / -1;
  padding: 2.5rem 2.5rem 1.5rem;
  border-bottom: 1px solid rgba(0,255,136,0.1);
  background: linear-gradient(180deg, rgba(0,255,136,0.04) 0%, transparent 100%);
}
.page-header-label {
  font-family: 'Rajdhani', sans-serif; font-size: 0.72rem;
  font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--neon-green); margin-bottom: 0.4rem;
}
.page-header-title {
  font-family: 'Orbitron', monospace; font-weight: 900;
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  color: #fff; letter-spacing: -0.01em;
}
.page-header-title span { color: var(--neon-blue); text-shadow: var(--glow-blue); }

/* ─── LEFT: X TOWER ─── */
.tower-panel {
  border-right: 1px solid rgba(0,255,136,0.12);
  background: rgba(8,13,26,0.6);
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  overflow: hidden;
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
}

.tower-title {
  font-family: 'Orbitron', monospace; font-weight: 700;
  font-size: 0.9rem; letter-spacing: 0.15em;
  color: var(--neon-green); text-shadow: var(--glow-green);
  text-align: center;
}
.tower-subtitle {
  font-family: 'Rajdhani', sans-serif; font-size: 0.72rem;
  font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-dim); text-align: center; margin-top: -0.5rem;
}

/* Tower container */
.tower-container {
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.tower-svg-wrap {
  width: 220px;
  height: 100%;
  max-height: 560px;
  position: relative;
}

/* Each floor segment */
.tower-floors {
  display: flex;
  flex-direction: column-reverse; /* 1F at bottom */
  width: 100%;
  height: 100%;
  gap: 1px;
  position: relative;
}

.floor-seg {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
  cursor: default;
  transition: all 0.3s ease;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
  min-height: 4px;
}

.floor-seg .floor-label {
  font-family: 'Orbitron', monospace;
  font-size: 0.52rem; font-weight: 700;
  letter-spacing: 0.05em;
  opacity: 0.6;
  white-space: nowrap;
  transition: opacity 0.3s;
}

/* Zone colors (default dim) */
.zone-xf      { background: rgba(255,215,0,0.08);   border-left: 2px solid rgba(255,215,0,0.3); }
.zone-90s     { background: rgba(250,204,21,0.06);  border-left: 2px solid rgba(250,204,21,0.25); }
.zone-80s     { background: rgba(226,232,240,0.05); border-left: 2px solid rgba(226,232,240,0.2); }
.zone-70s     { background: rgba(249,115,22,0.05);  border-left: 2px solid rgba(249,115,22,0.2); }
.zone-50s60s  { background: rgba(236,72,153,0.05);  border-left: 2px solid rgba(236,72,153,0.2); }
.zone-low     { background: rgba(14,165,233,0.05);  border-left: 2px solid rgba(14,165,233,0.2); }

/* Active (player highlight) */
.floor-seg.active-floor {
  z-index: 10;
  animation: floorPulse 1.8s ease-in-out infinite;
}
.zone-xf.active-floor      { background: rgba(255,215,0,0.35);   border-left: 3px solid #ffd700;   box-shadow: inset 0 0 20px rgba(255,215,0,0.3),  0 0 30px rgba(255,215,0,0.5);  }
.zone-90s.active-floor     { background: rgba(250,204,21,0.3);   border-left: 3px solid #facc15;   box-shadow: inset 0 0 20px rgba(250,204,21,0.3), 0 0 30px rgba(250,204,21,0.5); }
.zone-80s.active-floor     { background: rgba(226,232,240,0.25); border-left: 3px solid #e2e8f0;   box-shadow: inset 0 0 20px rgba(226,232,240,0.2),0 0 30px rgba(226,232,240,0.4); }
.zone-70s.active-floor     { background: rgba(249,115,22,0.3);   border-left: 3px solid #f97316;   box-shadow: inset 0 0 20px rgba(249,115,22,0.3), 0 0 30px rgba(249,115,22,0.5); }
.zone-50s60s.active-floor  { background: rgba(236,72,153,0.3);   border-left: 3px solid #ec4899;   box-shadow: inset 0 0 20px rgba(236,72,153,0.3), 0 0 30px rgba(236,72,153,0.5); }
.zone-low.active-floor     { background: rgba(14,165,233,0.3);   border-left: 3px solid #0ea5e9;   box-shadow: inset 0 0 20px rgba(14,165,233,0.3), 0 0 30px rgba(14,165,233,0.5); }

.floor-seg.active-floor .floor-label { opacity: 1; font-size: 0.62rem; }

@keyframes floorPulse {
  0%, 100% { filter: brightness(1); }
  50%       { filter: brightness(1.5); }
}

/* Rainbow shimmer for XF */
.zone-xf.active-floor {
  background: linear-gradient(90deg,
    rgba(255,0,128,0.3), rgba(255,165,0,0.3),
    rgba(255,255,0,0.3), rgba(0,255,128,0.3),
    rgba(0,200,255,0.3), rgba(180,0,255,0.3));
  background-size: 200% 100%;
  animation: floorPulse 1.8s ease-in-out infinite, rainbowSlide 3s linear infinite;
  border-left: 3px solid #ffd700;
  box-shadow: 0 0 40px rgba(255,215,0,0.7), 0 0 80px rgba(255,215,0,0.3);
}
@keyframes rainbowSlide { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

/* Indicator arrow */
.tower-indicator {
  position: absolute;
  right: -28px;
  transform: translateY(-50%);
  display: flex; align-items: center; gap: 4px;
  opacity: 0;
  transition: all 0.6s ease;
  pointer-events: none;
}
.tower-indicator.show { opacity: 1; }
.tower-indicator-arrow {
  width: 0; height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-right: 10px solid currentColor;
}
.tower-indicator-label {
  font-family: 'Orbitron', monospace;
  font-size: 0.65rem; font-weight: 700;
  white-space: nowrap;
}

/* Zone legend */
.zone-legend {
  width: 100%;
  display: flex; flex-direction: column; gap: 4px;
}
.zone-legend-item {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Rajdhani', sans-serif; font-size: 0.72rem;
  font-weight: 600; color: var(--text-dim);
}
.zone-dot {
  width: 8px; height: 8px; border-radius: 1px;
  flex-shrink: 0;
}

/* ─── RIGHT: SEARCH + STATS ─── */
.stats-panel {
  padding: 2rem 2.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  overflow-y: auto;
}

/* Search box */
.search-section {}
.search-label {
  font-family: 'Rajdhani', sans-serif; font-size: 0.72rem;
  font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--neon-green); margin-bottom: 0.8rem;
}
.search-wrap {
  display: flex; gap: 0.75rem;
  position: relative;
}
.search-input {
  flex: 1;
  background: rgba(8,13,26,0.8);
  border: 1px solid rgba(0,255,136,0.3);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  padding: 0.85rem 1.2rem 0.85rem 3rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.search-input:focus {
  border-color: var(--neon-green);
  box-shadow: var(--glow-green);
}
.search-input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
  color: var(--neon-green); font-size: 0.9rem;
  pointer-events: none;
}
.search-btn {
  background: var(--neon-green); color: var(--bg);
  font-family: 'Orbitron', monospace; font-size: 0.78rem;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  border: none; cursor: pointer;
  padding: 0 1.5rem;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  white-space: nowrap;
}
.search-btn:hover {
  transform: translateY(-1px);
  box-shadow: var(--glow-green);
  filter: brightness(1.1);
}
.search-btn:active { transform: translateY(0); }

/* Loading / Error / Empty */
.state-msg {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 1rem;
  padding: 3rem;
  text-align: center;
  color: var(--text-dim);
  font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 500;
  letter-spacing: 0.1em;
}
.state-msg .state-icon { font-size: 2.5rem; }
.state-msg.error { color: var(--neon-pink); }
.state-msg.hidden { display: none; }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(0,255,136,0.15);
  border-top-color: var(--neon-green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ─── PLAYER CARD ─── */
.results-area { display: flex; flex-direction: column; gap: 1.5rem; }

.player-card {
  background: rgba(8,13,26,0.7);
  border: 1px solid rgba(0,255,136,0.15);
  padding: 0;
  overflow: hidden;
  position: relative;
  animation: cardIn 0.5s ease both;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

.player-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--neon-green), var(--neon-blue), var(--neon-pink));
}

/* Card header */
.card-header {
  padding: 1.5rem 2rem;
  display: flex; align-items: center; gap: 1.5rem;
  border-bottom: 1px solid rgba(0,255,136,0.1);
  background: rgba(0,255,136,0.03);
  flex-wrap: wrap;
}

.player-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', monospace; font-weight: 900; font-size: 1.4rem;
  color: var(--bg); flex-shrink: 0;
  position: relative;
}
.player-avatar::after {
  content: '';
  position: absolute; inset: -3px; border-radius: 50%;
  border: 2px solid rgba(0,255,136,0.3);
  animation: avatarPulse 2s ease-in-out infinite;
}
@keyframes avatarPulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.05); }
}

.player-info { flex: 1; }
.player-name {
  font-family: 'Orbitron', monospace; font-weight: 700;
  font-size: 1.4rem; color: #fff; letter-spacing: 0.03em;
  margin-bottom: 0.25rem;
}
.player-meta {
  font-family: 'Rajdhani', sans-serif; font-size: 0.8rem;
  font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-dim);
}

.rank-badge {
  font-family: 'Orbitron', monospace; font-weight: 900;
  font-size: 2rem; letter-spacing: 0.05em;
  padding: 0.4rem 1.2rem;
  border: 2px solid currentColor;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  text-align: center;
}

/* Rank colors */
.rank-xf       { color: #ffd700; border-color: #ffd700; text-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
.rank-90s      { color: var(--neon-yellow); border-color: var(--neon-yellow); text-shadow: var(--glow-yellow); }
.rank-80s      { color: var(--neon-white);  border-color: var(--neon-white);  text-shadow: var(--glow-white); }
.rank-70s      { color: var(--neon-orange); border-color: var(--neon-orange); text-shadow: var(--glow-orange); }
.rank-50s60s   { color: var(--neon-pink);   border-color: var(--neon-pink);   text-shadow: var(--glow-pink); }
.rank-low      { color: var(--neon-blue);   border-color: var(--neon-blue);   text-shadow: var(--glow-blue); }

/* Card body */
.card-body { padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1.2rem; }

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0.75rem;
}
.stat-item {
  background: rgba(4,7,15,0.6);
  border: 1px solid rgba(0,255,136,0.1);
  padding: 0.85rem 1rem;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
}
.stat-label {
  font-family: 'Rajdhani', sans-serif; font-size: 0.68rem;
  font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 0.3rem;
}
.stat-value {
  font-family: 'Orbitron', monospace; font-weight: 700;
  font-size: 1.25rem; color: var(--neon-green);
}
.stat-value.blue  { color: var(--neon-blue); }
.stat-value.pink  { color: var(--neon-pink); }
.stat-value.yellow{ color: var(--neon-yellow); }
.stat-value.white { color: #fff; }

/* Win rate bar */
.winrate-section {}
.winrate-label {
  font-family: 'Rajdhani', sans-serif; font-size: 0.72rem;
  font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 0.6rem;
  display: flex; justify-content: space-between; align-items: center;
}
.winrate-bars { display: flex; flex-direction: column; gap: 0.5rem; }
.winrate-row { display: flex; align-items: center; gap: 0.75rem; }
.winrate-row-label {
  font-family: 'Rajdhani', sans-serif; font-size: 0.7rem;
  font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-dim); width: 70px; flex-shrink: 0;
}
.winrate-track {
  flex: 1; height: 8px; background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
  clip-path: polygon(3px 0%, 100% 0%, calc(100% - 2px) 100%, 0% 100%);
}
.winrate-fill {
  height: 100%; border-radius: 2px;
  transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
  width: 0%;
}
.fill-green  { background: linear-gradient(90deg, var(--neon-green), rgba(0,255,136,0.6)); }
.fill-blue   { background: linear-gradient(90deg, var(--neon-blue), rgba(14,165,233,0.6)); }
.fill-pink   { background: linear-gradient(90deg, var(--neon-pink), rgba(236,72,153,0.6)); }
.winrate-pct {
  font-family: 'Orbitron', monospace; font-size: 0.72rem;
  font-weight: 700; width: 44px; text-align: right; flex-shrink: 0;
}

/* Rival block */
.rival-block {
  background: rgba(236,72,153,0.05);
  border: 1px solid rgba(236,72,153,0.2);
  padding: 1rem 1.2rem;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.rival-header {
  font-family: 'Rajdhani', sans-serif; font-size: 0.68rem;
  font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--neon-pink); margin-bottom: 0.5rem;
  display: flex; align-items: center; gap: 6px;
}
.rival-name {
  font-family: 'Orbitron', monospace; font-weight: 700;
  font-size: 1rem; color: #fff; margin-bottom: 0.25rem;
}
.rival-record {
  font-family: 'Rajdhani', sans-serif; font-size: 0.88rem;
  font-weight: 600; color: var(--text-dim);
}

/* Awards block */
.awards-block {}
.awards-header {
  font-family: 'Rajdhani', sans-serif; font-size: 0.68rem;
  font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--neon-yellow); margin-bottom: 0.6rem;
}
.awards-row {
  display: flex; gap: 0.6rem; flex-wrap: wrap;
}
.award-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 0.4rem 0.8rem;
  font-family: 'Orbitron', monospace; font-size: 0.72rem; font-weight: 700;
  border: 1px solid currentColor;
  clip-path: polygon(5px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
}
.award-1st { color: #ffd700; border-color: rgba(255,215,0,0.5); background: rgba(255,215,0,0.08); }
.award-2nd { color: #c0c0c0; border-color: rgba(192,192,192,0.4); background: rgba(192,192,192,0.06); }
.award-3rd { color: #cd7f32; border-color: rgba(205,127,50,0.4); background: rgba(205,127,50,0.06); }
.award-4th { color: var(--text-dim); border-color: rgba(148,163,184,0.3); background: rgba(148,163,184,0.05); }

/* BP highlight */
.bp-display {
  display: flex; align-items: baseline; gap: 0.5rem;
}
.bp-value {
  font-family: 'Orbitron', monospace; font-weight: 900;
  font-size: 2rem; color: var(--neon-yellow);
  text-shadow: var(--glow-yellow);
}
.bp-unit {
  font-family: 'Rajdhani', sans-serif; font-size: 0.85rem;
  font-weight: 600; letter-spacing: 0.15em; color: var(--text-dim);
}

/* ─── Responsive ─── */
@media (max-width: 900px) {
  .page-wrap {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
  }
  .page-header { grid-column: 1; }
  .tower-panel {
    position: static;
    height: auto;
    max-height: 400px;
    border-right: none;
    border-bottom: 1px solid rgba(0,255,136,0.12);
    flex-direction: row;
    align-items: flex-start;
    padding: 1.5rem;
    gap: 1.2rem;
  }
  .tower-container {
    flex: none;
    width: 140px;
    height: 280px;
    flex-shrink: 0;
  }
  .zone-legend { flex-direction: column; }
  .stats-panel { padding: 1.5rem; }
}

@media (max-width: 540px) {
  .card-header { flex-direction: column; align-items: flex-start; }
  .rank-badge { font-size: 1.5rem; }
  .stats-panel { padding: 1rem; }
  .card-body { padding: 1rem; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.3); border-radius: 2px; }

/* Util */
.hidden { display: none !important; }
</style>
</head>

<body>
<div class="grid-bg"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">BEYX<span style="color:#fff;opacity:.4">//</span>MOI</a>
  <ul class="nav-links">
    <li><a href="index.html">HOME</a></li>
    <li><a href="index.html#events">EVENTS</a></li>
    <li><a href="player_stats.html" class="active">PLAYERS</a></li>
  </ul>
</nav>

<!-- PAGE WRAP -->
<div class="page-wrap">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-label">// DATABASE //</div>
    <h1 class="page-header-title">PLAYER <span>STATS</span></h1>
  </div>

  <!-- LEFT: X TOWER -->
  <aside class="tower-panel" id="towerPanel">
    <div style="text-align:center">
      <div class="tower-title">X-TOWER</div>
      <div class="tower-subtitle">Rank Visualizer</div>
    </div>

    <div class="tower-container">
      <div class="tower-svg-wrap">
        <div class="tower-floors" id="towerFloors">
          <!-- JS で生成 -->
        </div>
        <!-- indicator -->
        <div class="tower-indicator" id="towerIndicator">
          <div class="tower-indicator-arrow"></div>
          <div class="tower-indicator-label" id="towerIndicatorLabel"></div>
        </div>
      </div>
    </div>

    <div class="zone-legend">
      <div class="zone-legend-item">
        <div class="zone-dot" style="background:#ffd700;box-shadow:0 0 6px #ffd700"></div>
        <span>XF (100F)</span>
      </div>
      <div class="zone-legend-item">
        <div class="zone-dot" style="background:var(--neon-yellow)"></div>
        <span>90F – 99F</span>
      </div>
      <div class="zone-legend-item">
        <div class="zone-dot" style="background:var(--neon-white)"></div>
        <span>80F – 89F</span>
      </div>
      <div class="zone-legend-item">
        <div class="zone-dot" style="background:var(--neon-orange)"></div>
        <span>70F – 79F</span>
      </div>
      <div class="zone-legend-item">
        <div class="zone-dot" style="background:var(--neon-pink)"></div>
        <span>50F – 69F</span>
      </div>
      <div class="zone-legend-item">
        <div class="zone-dot" style="background:var(--neon-blue)"></div>
        <span>01F – 49F</span>
      </div>
    </div>
  </aside>

  <!-- RIGHT: SEARCH + STATS -->
  <main class="stats-panel" id="statsPanel">

    <!-- Search -->
    <div class="search-section">
      <div class="search-label">// PLAYER SEARCH</div>
      <div class="search-wrap">
        <i class="fa fa-search search-icon"></i>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="選手名を入力（部分一致）"
          autocomplete="off"
        >
        <button class="search-btn" id="searchBtn" onclick="doSearch()">
          SEARCH
        </button>
      </div>
    </div>

    <!-- States -->
    <div class="state-msg hidden" id="stateLoading">
      <div class="spinner"></div>
      <span>データを取得中...</span>
    </div>
    <div class="state-msg hidden" id="stateIdle">
      <div class="state-icon">🔍</div>
      <span>選手名を入力して検索してください</span>
    </div>
    <div class="state-msg hidden" id="stateEmpty">
      <div class="state-icon">📭</div>
      <span>該当する選手が見つかりませんでした</span>
    </div>
    <div class="state-msg error hidden" id="stateError">
      <div class="state-icon">⚠️</div>
      <span id="stateErrorMsg">データの取得に失敗しました。</span>
    </div>

    <!-- Results -->
    <div class="results-area" id="resultsArea"></div>

  </main>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SHEET_ID  = '1mJB7cH1I471WhFYqLh7B_IOECD6CuybuawFB89SN9Uc';
const API_KEY   = 'AIzaSyCSfxgBXjAuUEV3JslZnSOpJTdTcr6Jysk';
const RANGE     = encodeURIComponent('🌐 Webデータ出力!A2:J');
const API_URL   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;

let allPlayers = null; // cache

// ─── TOWER SETUP ──────────────────────────────────────────
function getZoneClass(rankNum) {
  if (rankNum === 100) return 'zone-xf';
  if (rankNum >= 90)  return 'zone-90s';
  if (rankNum >= 80)  return 'zone-80s';
  if (rankNum >= 70)  return 'zone-70s';
  if (rankNum >= 50)  return 'zone-50s60s';
  return 'zone-low';
}

function getRankNum(rankStr) {
  if (!rankStr) return 1;
  const s = rankStr.trim().toUpperCase();
  if (s === 'XF') return 100;
  const m = s.match(/^(\d+)F$/);
  if (m) return parseInt(m[1]);
  return 1;
}

function getRankClass(rankNum) {
  if (rankNum === 100) return 'rank-xf';
  if (rankNum >= 90)   return 'rank-90s';
  if (rankNum >= 80)   return 'rank-80s';
  if (rankNum >= 70)   return 'rank-70s';
  if (rankNum >= 50)   return 'rank-50s60s';
  return 'rank-low';
}

function getIndicatorColor(rankNum) {
  if (rankNum === 100) return '#ffd700';
  if (rankNum >= 90)   return 'var(--neon-yellow)';
  if (rankNum >= 80)   return 'var(--neon-white)';
  if (rankNum >= 70)   return 'var(--neon-orange)';
  if (rankNum >= 50)   return 'var(--neon-pink)';
  return 'var(--neon-blue)';
}

function buildTower() {
  const floorsEl = document.getElementById('towerFloors');
  floorsEl.innerHTML = '';

  // 100 floors: index 0 = floor 1 (bottom), index 99 = floor 100 (top)
  // We use flex-direction: column-reverse so index 0 renders at bottom
  for (let f = 1; f <= 100; f++) {
    const seg = document.createElement('div');
    seg.className = 'floor-seg ' + getZoneClass(f);
    seg.dataset.floor = f;

    // Show label only at boundaries
    if (f === 1 || f === 50 || f === 70 || f === 80 || f === 90 || f === 100) {
      const lbl = document.createElement('span');
      lbl.className = 'floor-label';
      lbl.textContent = f === 100 ? 'XF' : f + 'F';
      seg.appendChild(lbl);
    }
    floorsEl.appendChild(seg);
  }
}

function highlightTower(rankNum) {
  // Remove existing active
  document.querySelectorAll('.floor-seg.active-floor').forEach(el => {
    el.classList.remove('active-floor');
  });

  if (!rankNum) return;

  // Find segment
  const seg = document.querySelector(`.floor-seg[data-floor="${rankNum}"]`);
  if (!seg) return;

  // Highlight a small range around the rank for visibility
  const range = rankNum === 100 ? 3 : 2;
  for (let d = -range; d <= range; d++) {
    const f = rankNum + d;
    if (f >= 1 && f <= 100) {
      const s = document.querySelector(`.floor-seg[data-floor="${f}"]`);
      if (s) s.classList.add('active-floor');
    }
  }

  // Scroll segment into view within tower
  seg.scrollIntoView({ block: 'center', behavior: 'smooth' });

  // Position indicator
  const indicator = document.getElementById('towerIndicator');
  const label     = document.getElementById('towerIndicatorLabel');
  const color     = getIndicatorColor(rankNum);
  indicator.style.color = color;
  label.textContent      = rankNum === 100 ? 'XF' : rankNum + 'F';
  indicator.classList.add('show');

  // Position indicator vertically relative to segment
  const floorsEl = document.getElementById('towerFloors');
  const floorH   = floorsEl.offsetHeight;
  const segTop   = seg.offsetTop; // from bottom due to column-reverse? test needed
  // Use getBoundingClientRect relative to parent
  const parentRect = floorsEl.parentElement.getBoundingClientRect();
  const segRect    = seg.getBoundingClientRect();
  const relTop     = segRect.top - parentRect.top + segRect.height / 2;
  indicator.style.top = relTop + 'px';
}

// ─── DATA FETCH ──────────────────────────────────────────
async function fetchPlayers() {
  if (allPlayers) return allPlayers;
  const res = await fetch(API_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  allPlayers = (json.values || []).filter(r => r[0] && r[0].trim() !== '');
  return allPlayers;
}

// ─── SEARCH ──────────────────────────────────────────────
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  setState('loading');

  try {
    const players = await fetchPlayers();
    const matched = players.filter(r => r[0].includes(query));

    if (matched.length === 0) {
      setState('empty');
      highlightTower(null);
      return;
    }

    setState('results');
    renderResults(matched);
    // Highlight first match's rank in tower
    const firstRank = getRankNum(matched[0][2]);
    highlightTower(firstRank);

  } catch(e) {
    console.error(e);
    setState('error', 'データの取得に失敗しました: ' + e.message);
    highlightTower(null);
  }
}

function setState(state, msg = '') {
  document.getElementById('stateLoading').classList.add('hidden');
  document.getElementById('stateIdle').classList.add('hidden');
  document.getElementById('stateEmpty').classList.add('hidden');
  document.getElementById('stateError').classList.add('hidden');
  document.getElementById('resultsArea').innerHTML = '';

  if (state === 'loading') {
    document.getElementById('stateLoading').classList.remove('hidden');
  } else if (state === 'idle') {
    document.getElementById('stateIdle').classList.remove('hidden');
  } else if (state === 'empty') {
    document.getElementById('stateEmpty').classList.remove('hidden');
  } else if (state === 'error') {
    document.getElementById('stateErrorMsg').textContent = msg;
    document.getElementById('stateError').classList.remove('hidden');
  }
  // 'results' → do nothing (resultsArea will be populated)
}

// ─── RENDER ──────────────────────────────────────────────
function parseAwards(str) {
  // 入賞回数フォーマット例: "1位:3回/2位:2回/3位:1回/4位:0回"
  if (!str) return { p1:0, p2:0, p3:0, p4:0 };
  const get = (n) => {
    const m = str.match(new RegExp(n + '位[：:](\\d+)'));
    return m ? parseInt(m[1]) : 0;
  };
  return { p1: get(1), p2: get(2), p3: get(3), p4: get(4) };
}

function pct(val) {
  if (!val || val === '' || val === '-') return '--';
  // remove % if present
  return val.toString().replace('%','') + '%';
}

function pctNum(val) {
  if (!val || val === '' || val === '-') return 0;
  return parseFloat(val.toString().replace('%','')) || 0;
}

function avatarChar(name) {
  if (!name) return '?';
  return name[0];
}

function renderResults(players) {
  const area = document.getElementById('resultsArea');
  area.innerHTML = '';

  players.forEach((row, i) => {
    const name     = (row[0] || '').trim();
    const matches  = (row[1] || '--').trim();
    const rankStr  = (row[2] || '--').trim();
    const bp       = (row[3] || '--').trim();
    const wr       = row[4];
    const wrEx     = row[5];
    const wrInf    = row[6];
    const rival    = (row[7] || '').trim();
    const rivalWr  = (row[8] || '').trim();
    const awards   = parseAwards((row[9] || '').trim());

    const rankNum   = getRankNum(rankStr);
    const rankClass = getRankClass(rankNum);
    const displayRank = rankNum === 100 ? 'XF' : rankStr;

    const wrPct    = pctNum(wr);
    const wrExPct  = pctNum(wrEx);
    const wrInfPct = pctNum(wrInf);

    const card = document.createElement('div');
    card.className = 'player-card';
    card.style.animationDelay = (i * 0.08) + 's';

    // Awards HTML
    let awardsHtml = '';
    const awardData = [
      { cls:'award-1st', icon:'🥇', label:'1ST', val: awards.p1 },
      { cls:'award-2nd', icon:'🥈', label:'2ND', val: awards.p2 },
      { cls:'award-3rd', icon:'🥉', label:'3RD', val: awards.p3 },
      { cls:'award-4th', icon:'',   label:'4TH', val: awards.p4 },
    ].filter(a => a.val > 0);

    if (awardData.length > 0) {
      awardsHtml = `
        <div class="awards-block">
          <div class="awards-header"><i class="fa fa-trophy"></i> 入賞履歴</div>
          <div class="awards-row">
            ${awardData.map(a => `
              <div class="award-badge ${a.cls}">${a.icon} ${a.label} × ${a.val}</div>
            `).join('')}
          </div>
        </div>`;
    }

    // Rival HTML
    let rivalHtml = '';
    if (rival) {
      rivalHtml = `
        <div class="rival-block">
          <div class="rival-header"><i class="fa fa-crosshairs"></i> RIVAL</div>
          <div class="rival-name">${rival}</div>
          ${rivalWr ? `<div class="rival-record">対戦成績: ${rivalWr}</div>` : ''}
        </div>`;
    }

    card.innerHTML = `
      <div class="card-header">
        <div class="player-avatar">${avatarChar(name)}</div>
        <div class="player-info">
          <div class="player-name">${name}</div>
          <div class="player-meta">大会参加: ${matches} 試合</div>
        </div>
        <div class="rank-badge ${rankClass}">${displayRank}</div>
      </div>
      <div class="card-body">

        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">BP</div>
            <div class="bp-display">
              <div class="bp-value">${bp !== '--' ? bp : '--'}</div>
              ${bp !== '--' ? '<div class="bp-unit">pts</div>' : ''}
            </div>
          </div>
          <div class="stat-item">
            <div class="stat-label">勝率 (総合)</div>
            <div class="stat-value">${pct(wr)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">勝率 (EX)</div>
            <div class="stat-value blue">${pct(wrEx)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">勝率 (INF)</div>
            <div class="stat-value pink">${pct(wrInf)}</div>
          </div>
        </div>

        <div class="winrate-section">
          <div class="winrate-label">
            <span><i class="fa fa-chart-bar"></i> 勝率グラフ</span>
          </div>
          <div class="winrate-bars">
            <div class="winrate-row">
              <div class="winrate-row-label">総合</div>
              <div class="winrate-track">
                <div class="winrate-fill fill-green" data-pct="${wrPct}"></div>
              </div>
              <div class="winrate-pct" style="color:var(--neon-green)">${pct(wr)}</div>
            </div>
            <div class="winrate-row">
              <div class="winrate-row-label">Extreme</div>
              <div class="winrate-track">
                <div class="winrate-fill fill-blue" data-pct="${wrExPct}"></div>
              </div>
              <div class="winrate-pct" style="color:var(--neon-blue)">${pct(wrEx)}</div>
            </div>
            <div class="winrate-row">
              <div class="winrate-row-label">Infinity</div>
              <div class="winrate-track">
                <div class="winrate-fill fill-pink" data-pct="${wrInfPct}"></div>
              </div>
              <div class="winrate-pct" style="color:var(--neon-pink)">${pct(wrInf)}</div>
            </div>
          </div>
        </div>

        ${rivalHtml}
        ${awardsHtml}

      </div>
    `;

    area.appendChild(card);

    // Animate bars after render
    requestAnimationFrame(() => {
      card.querySelectorAll('.winrate-fill[data-pct]').forEach(fill => {
        const p = parseFloat(fill.dataset.pct) || 0;
        setTimeout(() => { fill.style.width = Math.min(p, 100) + '%'; }, 200 + i * 80);
      });
    });
  });
}

// ─── KEYBOARD ────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ─── INIT ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildTower();
  setState('idle');

  // Prefetch in background
  fetchPlayers().catch(() => {});
});
</script>
</body>
</html>
