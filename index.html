<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ITABASHI BEYBLADE HUD - Ver.28.6 Memory Flush (LINK EDITION)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@1,700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        @font-face { font-family: 'DSEG7 Classic'; src: url('./font/DSEG7Classic-BoldItalic.ttf') format('truetype'); font-weight: bold; font-style: italic; }

        :root {
            --bx-green: #b6ff00; --bx-blue: #00eaff; --bx-orange: #ffaa00;
            --bx-red-orange: #ff4500; --bx-red: #ff0055;
            --bx-yellow: #fff000;
            --safe-left: env(safe-area-inset-left); --safe-right: env(safe-area-inset-right);
        }

        body { 
            margin: 0; padding: 0; background: black; 
            font-family: 'Chakra Petch', sans-serif; overflow: hidden; color: white; 
            -webkit-tap-highlight-color: transparent; transition: background-color 0.3s;
            touch-action: none; 
        }

        input, div, .score { font-family: inherit; }
        
        body.green-mode { background-color: #00ff00 !important; }
        body.green-mode #video-container { display: none !important; }
        
        #video-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; overflow: hidden; }
        #camera-bg, #replay-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform-origin: center center; }
        #replay-video { z-index: 10; display: none; background: black; }
        .scan-line { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 3px); pointer-events: none; }

        /* システムボタン */
        .system-btn { 
            position: fixed; z-index: 80; background: rgba(0,0,0,0.5); color: #aaa; border: 1px solid #555; 
            width: 45px; height: 45px; display: flex; justify-content: center; align-items: center;
            font-size: 14px; font-weight: 900; cursor: pointer; border-radius: 8px; transition: 0.3s;
            font-family: 'Orbitron', sans-serif !important; user-select: none;
        }
        .system-btn:hover { color: var(--bx-green); border-color: var(--bx-green); }
        .system-btn:active { background: #333; transform: scale(0.95); }

        .btn-reset { top: 20px; left: max(20px, calc(var(--safe-left) + 20px)); } 
        .btn-bg { bottom: 20px; left: max(20px, calc(var(--safe-left) + 20px)); }
        .btn-rotate { bottom: 20px; left: max(80px, calc(var(--safe-left) + 75px)); color: var(--bx-blue); border-color: var(--bx-blue); }
        .btn-mic { bottom: 20px; left: max(140px, calc(var(--safe-left) + 130px)); }
        .btn-mic.active { color: white; background: var(--bx-red); border-color: white; box-shadow: 0 0 10px var(--bx-red); }
        .btn-timer { top: 20px; right: max(20px, calc(var(--safe-right) + 20px)); } 
        .btn-timer-toggle { top: 20px; right: max(80px, calc(var(--safe-right) + 75px)); color: var(--bx-blue); }
        .btn-winpoint { bottom: 20px; right: max(20px, calc(var(--safe-right) + 20px)); color: var(--bx-orange); font-size: 18px; }
        body.pro-mode .system-btn { display: none !important; }

        /* HUD要素 */
        #battle-counter-area { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 80; text-align: center; font-family: 'Orbitron', sans-serif !important; pointer-events: none; transition: 0.3s; }
        body.pro-mode #battle-counter-area { top: 15px; }
        .battle-ordinal { font-size: 32px; font-weight: 900; color: var(--bx-yellow); text-shadow: 0 0 15px rgba(255, 242, 0, 0.6), 2px 2px 0 black; margin-right: 5px; }
        .battle-label { font-size: 20px; font-weight: 900; color: white; text-shadow: 1px 1px 0 black; }
        
        #tournament-title-area { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 80; display: flex; flex-direction: column; align-items: center; width: 60%; transition: 0.3s; pointer-events: none; }
        .tournament-input { font-family: 'Chakra Petch', sans-serif !important; font-size: 16px; font-weight: 700; font-style: italic; color: rgba(255, 255, 255, 0.6); text-shadow: 2px 2px 2px black; background: transparent; border: none; text-align: center; width: 100%; outline: none; line-height: 1.2; pointer-events: auto; }

        .player-wrapper { position: fixed; top: 75px; z-index: 50; display: flex; flex-direction: column; gap: 2px; transition: top 0.4s; }
        body.pro-mode .player-wrapper { top: 15px; }
        #p1-wrapper { left: max(20px, calc(var(--safe-left) + 20px)); align-items: flex-start; }
        #p2-wrapper { right: max(20px, calc(var(--safe-right) + 20px)); align-items: flex-end; }
        
        .name-input { font-family: 'Chakra Petch', sans-serif !important; font-size: 24px; font-style: italic; font-weight: bold; color: var(--bx-green); text-shadow: 2px 2px 0px black; background: transparent; border: none; border-bottom: 2px solid var(--bx-green); width: auto; min-width: 100px; max-width: 250px; field-sizing: content; outline: none; margin-bottom: 5px; }
        .score { font-family: 'DSEG7 Classic', sans-serif !important; font-weight: bold; font-style: italic; font-size: 85px; line-height: 1; color: white; text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 3px 3px 0px black; cursor: default; margin: 0; min-width: 60px; text-align: center; }
        
        .stats-row { display: flex; align-items: flex-start; gap: 20px; }
        #p1-wrapper .stats-row { flex-direction: row-reverse; }
        .buttons-col { display: flex; flex-direction: column; gap: 5px; margin-top: 5px; }
        
        .hud-btn { font-family: 'Orbitron', sans-serif !important; font-weight: 900; font-size: 18px; width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; user-select: none; }
        .hud-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }
        
        .btn-xtreme { border-color: var(--bx-red); color: var(--bx-red); }
        .btn-burst { border-color: var(--bx-red-orange); color: var(--bx-red-orange); }
        .btn-over { border-color: var(--bx-orange); color: var(--bx-orange); }
        .btn-spin { border-color: var(--bx-blue); color: var(--bx-blue); }

        .active-history { color: black !important; border-color: white !important; text-shadow: none !important; box-shadow: 0 0 15px currentColor; }
        .btn-xtreme.active-history { background: var(--bx-red) !important; box-shadow: 0 0 15px var(--bx-red); }
        .btn-burst.active-history { background: var(--bx-red-orange) !important; box-shadow: 0 0 15px var(--bx-red-orange); }
        .btn-over.active-history { background: var(--bx-orange) !important; box-shadow: 0 0 15px var(--bx-orange); }
        .btn-spin.active-history { background: var(--bx-blue) !important; box-shadow: 0 0 15px var(--bx-blue); }

        /* WIN表示 */
        #win-display {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            width: 100%; text-align: center;
            font-family: 'Orbitron', sans-serif !important; 
            font-weight: 900; font-style: italic;
            color: #fff000; opacity: 0; transition: 0.3s; z-index: 70; pointer-events: none; white-space: nowrap;
        }
        @keyframes glowing-win-anim {
            0%   { text-shadow: 0 0 20px #fff, 0 0 40px #fff000, 0 0 60px #fff000, 4px 4px 0 #000; }
            100% { text-shadow: 0 0 50px #fff, 0 0 100px #fff000, 0 0 150px #ffaa00, 4px 4px 0 #000; }
        }
        .show-win { opacity: 1 !important; transform: translate(-50%, -50%) scale(1.05) !important; animation: glowing-win-anim 0.8s infinite alternate ease-in-out; }
        .win-name { font-size: 15vmin; display: block; line-height: 1; }
        .win-label { font-size: 15vmin; display: block; margin-top: -0.15em; color: white; text-shadow: 0 0 30px white; line-height: 1; }

        /* エフェクト */
        #effect-overlay { position: fixed; top: 0; left: 0; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; pointer-events: none; }
        #effect-text { font-family: 'Orbitron', sans-serif; font-weight: 900; font-style: italic; color: white; text-shadow: 0 0 20px var(--bx-green), 4px 4px 0px black; width: 90%; text-align: center; opacity: 1; transition: opacity 0.5s ease-out; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .effect-finish-style { font-family: 'Orbitron', sans-serif !important; font-size: 18vmin !important; line-height: 1.0; transform: scale(1.1); white-space: pre-wrap; }
        .timer-style { font-family: 'DSEG7 Classic', sans-serif !important; font-size: 40vmin !important; }
        .interstitial-style { font-family: 'Orbitron', sans-serif !important; font-size: 14vmin !important; line-height: 1.2; color: white !important; text-shadow: 0 0 20px rgba(2
