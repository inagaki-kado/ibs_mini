<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>板橋会 タッグリーグ - CYBER BEY-TAG-LEAGUE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { 'sans': ['Noto Sans JP', 'sans-serif'], 'orbitron': ['Orbitron', 'sans-serif'] },
      colors: { 'cyber-bg': '#0a0e17', 'cyber-dark': '#111827', 'cyber-blue': '#0ea5e9', 'cyber-green': '#22c55e', 'cyber-pink': '#ec4899', 'cyber-text': '#e2e8f0', 'cyber-table-border': '#1f2937' }
    }}}
  </script>
  <style>
    body { background-color: #0a0e17; color: #e2e8f0; }
    .font-sf { font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 1px; }
    .hidden { display: none !important; }
    .memo-badge { display: inline-block; padding: 2px 6px; font-size: 0.7rem; font-weight: bold; color: #ec4899; border: 1px solid #ec4899; border-radius: 9999px; box-shadow: 0 0 5px #ec4899; margin-left: 8px; vertical-align: middle; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0a0e17; }
    ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #22c55e; }
    .score-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #1f2937; background: #0a0e17; color: #e2e8f0; font-family: 'Orbitron'; font-size: 16px; font-weight: bold; transition: all 0.2s; }
    .score-btn.active { border: 2px solid #ec4899; background: #ec4899; color: #fff; box-shadow: 0 0 10px #ec4899; transform: scale(1.1); }
  </style>
</head>
<body class="font-sans select-none relative h-screen flex flex-col overflow-hidden">

  <header class="bg-cyber-dark text-cyber-text p-4 text-center shadow-lg relative border-b-2 border-cyber-pink shrink-0">
    <h1 class="text-2xl font-sf text-cyber-pink drop-shadow-[0_0_8px_rgba(236,72,153,0.8)]">ITABASHI BEY-TAG-LEAGUE</h1>
    <p class="text-xs text-cyber-text opacity-70 font-sf tracking-widest">QUALIFYING & ELIMINATION SYSTEM</p>
    
    <div class="absolute top-1/2 -translate-y-1/2 right-4 flex items-center gap-2 z-50 bg-[#0a0e17] p-2 rounded-lg border border-cyber-table-border shadow-lg">
      <span class="text-[10px] text-cyber-blue font-sf font-bold hidden md:inline">HUD LINK</span>
      <input type="text" id="linkCodeInput" placeholder="CODE" class="w-16 p-1 bg-cyber-bg border border-cyber-blue text-cyber-text text-sm text-center outline-none font-sf transition-colors" maxlength="4">
      <button onclick="connectLink()" id="btn-connect" class="bg-cyber-dark border border-cyber-blue text-cyber-blue px-3 py-1 text-xs font-sf font-bold rounded">CONNECT</button>
      <button onclick="forceResetLink()" class="text-cyber-pink hover:text-white font-bold text-sm px-1" title="通信リセット">✖</button>
      <div id="link-status-dot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_5px_#ef4444]"></div>
    </div>
  </header>

  <div class="flex bg-cyber-dark shadow-md border-b border-cyber-table-border shrink-0 text-sm md:text-base overflow-x-auto">
    <button onclick="switchTab('setup')" id="tab-setup" class="flex-1 min-w-[100px] py-3 font-bold border-b-4 border-cyber-pink text-cyber-pink transition-colors">🤝 受付＆結成</button>
    <button onclick="switchTab('qual')" id="tab-qual" class="flex-1 min-w-[100px] py-3 font-bold border-b-4 border-transparent text-cyber-text hidden transition-colors">⚔️ 予選ラウンド</button>
    <button onclick="switchTab('rank')" id="tab-rank" class="flex-1 min-w-[100px] py-3 font-bold border-b-4 border-transparent text-cyber-text hidden transition-colors">📊 予選結果</button>
    <button onclick="switchTab('finals')" id="tab-finals" class="flex-1 min-w-[100px] py-3 font-bold border-b-4 border-transparent text-cyber-text hidden transition-colors">🏆 決勝T</button>
  </div>

  <div class="p-4 flex-1 overflow-y-auto w-full max-w-7xl mx-auto">
    
    <div
