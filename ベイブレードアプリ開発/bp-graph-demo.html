<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BP推移グラフ — デモ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #04070f;
  --bg2:        #080d1a;
  --bg3:        #0c1220;
  --neon-green: #00ff88;
  --neon-blue:  #0ea5e9;
  --neon-pink:  #ec4899;
  --neon-yellow:#facc15;
  --neon-orange:#f97316;
  --text:       #e2e8f0;
  --text-dim:   #94a3b8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  padding: 2rem;
  min-height: 100vh;
}

/* ─── 説明バナー ─── */
.demo-banner {
  background: linear-gradient(135deg, rgba(0,255,136,0.12), rgba(14,165,233,0.08));
  border: 1px solid rgba(0,255,136,0.3);
  border-radius: 8px;
  padding: 0.8rem 1.2rem;
  margin-bottom: 1.5rem;
  font-size: 0.78rem;
  color: var(--neon-green);
  letter-spacing: 0.05em;
  font-family: 'Orbitron', monospace;
  text-align: center;
}

/* ─── カード ─── */
.card {
  background: var(--bg2);
  border: 1px solid rgba(14,165,233,0.25);
  border-radius: 12px;
  padding: 1.5rem;
  max-width: 860px;
  margin: 0 auto;
}

/* ─── プレイヤーヘッダー ─── */
.player-header {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  margin-bottom: 1.5rem;
}

/* ランクアイコン（player_stats.html と同デザイン） */
.player-rank-icon {
  width: 64px; height: 64px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', monospace; font-weight: 900;
  letter-spacing: 0.04em;
  flex-shrink: 0;
  position: relative;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  border: 2px solid currentColor;
}
.rank-text { display: flex; align-items: flex-end; line-height: 1; gap: 1px; }
.rank-text .rank-num { font-size: 1.1rem; }
.rank-text .rank-f   { font-size: 0.9rem; }
.player-rank-icon::after {
  content: '';
  position: absolute; inset: -4px;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  border: 1px solid currentColor;
  opacity: 0.3;
  animation: iconPulse 2s ease-in-out infinite;
}
@keyframes iconPulse {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(1.04); }
}
/* ランク帯カラー */
.rank-low    { color: #ffffff; border-color: #ffffff; text-shadow: 0 0 16px rgba(255,255,255,0.8); box-shadow: 0 0 16px rgba(255,255,255,0.3); }
.rank-40s50s { color: #0ea5e9; border-color: #0ea5e9; text-shadow: 0 0 16px rgba(14,165,233,0.8); box-shadow: 0 0 16px rgba(14,165,233,0.35); }
.rank-60s70s { color: #00ff41; border-color: #00ff41; text-shadow: 0 0 16px rgba(0,255,65,0.8);  box-shadow: 0 0 16px rgba(0,255,65,0.35); }
.rank-80s    { color: #a855f7; border-color: #a855f7; text-shadow: 0 0 16px rgba(168,85,247,0.8); box-shadow: 0 0 16px rgba(168,85,247,0.35); }
.rank-90s    { color: #ef4444; border-color: #ef4444; text-shadow: 0 0 16px rgba(239,68,68,0.8);  box-shadow: 0 0 16px rgba(239,68,68,0.35); }
.rank-xf     { color: #f59e0b; border-color: #f59e0b; text-shadow: 0 0 20px rgba(245,158,11,0.9); box-shadow: 0 0 24px rgba(245,158,11,0.5); animation: goldPulse 2.4s ease-in-out infinite; }
@keyframes goldPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(245,158,11,0.5); }
  50%       { box-shadow: 0 0 40px rgba(245,158,11,0.9), 0 0 80px rgba(245,158,11,0.4); }
}

/* プレイヤー情報 */
.player-info { flex: 1; }
.player-tower {
  font-family: 'Orbitron', monospace;
  font-size: 0.58rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-bottom: 0.2rem;
}
.player-name {
  font-family: 'Orbitron', monospace;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.35rem;
}
.bp-inline {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
}
.bp-label {
  font-family: 'Orbitron', monospace;
  font-size: 0.58rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}
.bp-value {
  font-family: 'Orbitron', monospace;
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--neon-green);
  text-shadow: 0 0 16px rgba(0,255,136,0.5);
}

/* ─── グラフセクション ─── */
.graph-section-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--neon-blue);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.graph-section-title::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 14px;
  background: var(--neon-blue);
  border-radius: 2px;
}

/* ─── BP統計サマリー ─── */
.bp-stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}
.bp-stat-box {
  background: rgba(14,165,233,0.06);
  border: 1px solid rgba(14,165,233,0.2);
  border-radius: 8px;
  padding: 0.75rem;
  text-align: center;
}
.bp-stat-label {
  font-size: 0.58rem;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  margin-bottom: 0.3rem;
}
.bp-stat-value {
  font-family: 'Orbitron', monospace;
  font-size: 1.0rem;
  font-weight: 700;
}
.bp-stat-value.up   { color: var(--neon-green); }
.bp-stat-value.down { color: #ef4444; }
.bp-stat-value.neu  { color: var(--neon-blue); }
.bp-stat-value.peak { color: var(--neon-yellow); }

/* ─── グラフ本体 ─── */
.chart-wrapper {
  background: rgba(4,7,15,0.6);
  border: 1px solid rgba(14,165,233,0.15);
  border-radius: 8px;
  padding: 1.2rem 1.2rem 0.8rem;
  position: relative;
}
.chart-container {
  position: relative;
  height: 280px;
}

/* ─── 大会イベントバッジ ─── */
.events-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 1.2rem;
}
.event-badge {
  font-size: 0.6rem;
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
  font-family: 'Orbitron', monospace;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
.event-badge.win   { background: rgba(0,255,136,0.15); border: 1px solid rgba(0,255,136,0.5); color: var(--neon-green); }
.event-badge.loss  { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.4);  color: #ef4444; }
.event-badge.medal { background: rgba(250,204,21,0.12); border: 1px solid rgba(250,204,21,0.5); color: var(--neon-yellow); }

/* ─── ランクアップアニメ枠 ─── */
.rankup-block {
  margin-top: 1.2rem;
  background: linear-gradient(135deg, rgba(250,204,21,0.08), rgba(249,115,22,0.05));
  border: 1px solid rgba(250,204,21,0.3);
  border-radius: 8px;
  padding: 0.8rem 1rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.rankup-icon { font-size: 1.6rem; }
.rankup-text { font-size: 0.75rem; color: var(--neon-yellow); line-height: 1.5; }
.rankup-text strong { font-family: 'Orbitron', monospace; font-size: 0.85rem; }

/* ─── トグルボタン ─── */
.view-toggle {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.toggle-btn {
  font-family: 'Orbitron', monospace;
  font-size: 0.6rem;
  padding: 0.4rem 0.9rem;
  border-radius: 4px;
  border: 1px solid rgba(14,165,233,0.4);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.15s;
}
.toggle-btn.active {
  background: var(--neon-blue);
  color: var(--bg);
  border-color: var(--neon-blue);
}
</style>
</head>
<body>

<div class="demo-banner">🔬 BP推移グラフ — 実装イメージデモ（サンプルデータ）</div>

<div class="card">

  <!-- プレイヤーヘッダー -->
  <div class="player-header">
    <div class="player-rank-icon rank-90s">
      <div class="rank-text">
        <span class="rank-num">95</span>
        <span class="rank-f">F</span>
      </div>
    </div>
    <div class="player-info">
      <div class="player-tower">S.I.T.X-TOWER</div>
      <div class="player-name">すが</div>
      <div class="bp-inline">
        <span class="bp-label">BEY POWER</span>
        <span class="bp-value">26,688</span>
      </div>
    </div>
  </div>

  <!-- BP HISTORY タイトル -->
  <div class="graph-section-title">📈 BP HISTORY</div>

  <!-- 表示切替 -->
  <div class="view-toggle">
    <button class="toggle-btn active" onclick="setView('all',this)">ALL</button>
    <button class="toggle-btn" onclick="setView('recent',this)">直近10回</button>
    <button class="toggle-btn" onclick="setView('tournament',this)">大会のみ</button>
  </div>

  <!-- グラフ本体 -->
  <div class="chart-wrapper">
    <div class="chart-container">
      <canvas id="bpChart"></canvas>
    </div>
  </div>

  <!-- 注目イベントバッジ -->
  <div style="font-size:0.6rem;color:var(--text-dim);letter-spacing:0.08em;font-family:'Orbitron',monospace;margin-top:1.2rem;margin-bottom:0.5rem;">NOTABLE MOMENTS</div>
  <div class="events-row">
    <div class="event-badge medal">🥇 インフィニティ発売記念 — 優勝</div>
    <div class="event-badge medal">🥇 エクストリームトーナメント(26年3月) — 優勝</div>
    <div class="event-badge medal">🥉 インフィニティスタジアム発売記念 — 3位</div>
    <div class="event-badge win">↑ チームバトル後 +1,450 BP UP</div>
  </div>

  <!-- ランクアップ通知 -->
  <div class="rankup-block">
    <div class="rankup-icon">🏢</div>
    <div class="rankup-text">
      <strong>最新ランクアップ：73F → 95F</strong><br>
      エクストリームトーナメント(26年3月) 優勝によりBPが大幅上昇
    </div>
  </div>

</div>

<script>
// ─── サンプルデータ（実際はGoogle Sheets APIから取得）───
const events = [
  { date: '2025/10/18', name: 'インフィニティ発売記念' },
  { date: '2025/10/18', name: 'インフィニティ発売記念 (EX部門)' },
  { date: '2025/11/15', name: 'インフィニティタイトルマッチ' },
  { date: '2025/12/13', name: 'チームバトル' },
  { date: '2025/12/13', name: 'チームバトル 個人決定戦' },
  { date: '2025/12/27', name: '12月練習会' },
  { date: '2026/01/04', name: '1月精鋭練習会' },
  { date: '2026/01/11', name: 'EXトーナメント (26年1月)' },
  { date: '2026/01/31', name: '1月練習会' },
  { date: '2026/02/08', name: 'インフィニティトーナメント (26年2月)' },
  { date: '2026/03/01', name: '3月練習会' },
  { date: '2026/03/13', name: 'トラボCUP (26年3月)' },
  { date: '2026/03/13', name: '統一王者決定戦' },
  { date: '2026/03/20', name: 'EXトーナメント (26年3月)' },
  { date: '2026/03/20', name: 'インフィニティタイトルマッチ (26年3月)' },
];

const bpData = [
  10000,
  14200,
  13800,
  15100,
  16000,
  15700,
  17200,
  18100,
  17500,
  20300,
  20100,
  22000,
  21500,
  24100,
  26688,
];

// ─── 同日をまとめるグルーピング処理 ───
const grouped = [];
const dateMap = new Map();
events.forEach((e, i) => {
  const bp = bpData[i + 1]; // bpData[0] は開始値
  if (!dateMap.has(e.date)) {
    const entry = { date: e.date, bp, names: [e.name] };
    dateMap.set(e.date, entry);
    grouped.push(entry);
  } else {
    dateMap.get(e.date).bp = bp;             // 同日最終BPに更新
    dateMap.get(e.date).names.push(e.name);  // 大会名を追記
  }
});

const dateLabels  = ['開始', ...grouped.map(g => g.date)];
const groupedBp   = [bpData[0], ...grouped.map(g => g.bp)];
const groupedNames = ['開始', ...grouped.map(g => g.names)];

// 増減の色設定
const pointColors = groupedBp.map((v, i) => {
  if (i === 0) return '#0ea5e9';
  return v >= groupedBp[i-1] ? '#00ff88' : '#ef4444';
});

const ctx = document.getElementById('bpChart').getContext('2d');

// グラデーション
const gradient = ctx.createLinearGradient(0, 0, 0, 280);
gradient.addColorStop(0, 'rgba(0,255,136,0.35)');
gradient.addColorStop(0.6, 'rgba(0,255,136,0.08)');
gradient.addColorStop(1, 'rgba(0,255,136,0.0)');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: dateLabels,
    datasets: [{
      label: 'BP',
      data: groupedBp,
      borderColor: '#00ff88',
      borderWidth: 2.5,
      backgroundColor: gradient,
      fill: true,
      tension: 0.35,
      pointBackgroundColor: pointColors,
      pointBorderColor: pointColors,
      pointRadius: 5,
      pointHoverRadius: 8,
      pointBorderWidth: 2,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(8,13,26,0.95)',
        borderColor: 'rgba(0,255,136,0.4)',
        borderWidth: 1,
        titleColor: '#e2e8f0',
        bodyColor: '#00ff88',
        footerColor: '#94a3b8',
        titleFont: { family: 'Orbitron', size: 12, weight: '700' },
        bodyFont: { family: 'Orbitron', size: 13, weight: '700' },
        footerFont: { family: 'Noto Sans JP', size: 10 },
        padding: 12,
        callbacks: {
          title: (items) => items[0].label,
          label: (item) => {
            const prev = item.dataIndex > 0 ? groupedBp[item.dataIndex - 1] : item.raw;
            const diff = item.raw - prev;
            const sign = diff >= 0 ? '+' : '';
            return `BP: ${item.raw.toLocaleString()}  (${sign}${diff.toLocaleString()})`;
          },
          footer: (items) => {
            const names = groupedNames[items[0].dataIndex];
            if (!names || names === '開始') return '';
            return Array.isArray(names) ? names.join('\n') : names;
          },
        }
      }
    },
    scales: {
      x: {
        ticks: {
          color: '#475569',
          font: { size: 9, family: 'Orbitron' },
          maxRotation: 45,
          maxTicksLimit: 10,
        },
        grid: { color: 'rgba(255,255,255,0.04)' },
        border: { color: 'rgba(255,255,255,0.08)' }
      },
      y: {
        ticks: {
          color: '#475569',
          font: { size: 10, family: 'Orbitron' },
          callback: (v) => (v/1000).toFixed(0) + 'k'
        },
        grid: { color: 'rgba(255,255,255,0.05)' },
        border: { color: 'rgba(255,255,255,0.08)' },
        min: 8000,
      }
    }
  }
});

// ─── 表示切替 ───
function setView(type, btn) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let showData, showDates;
  if (type === 'recent') {
    showData  = groupedBp.slice(-10);
    showDates = dateLabels.slice(-10);
  } else if (type === 'tournament') {
    // 練習会を除いた大会のみ（グルーピング後のインデックス）
    const idxs = [0,1,2,3,5,7,8,9,10,11];
    showData  = idxs.map(i => groupedBp[i]);
    showDates = idxs.map(i => dateLabels[i]);
  } else {
    showData  = groupedBp;
    showDates = dateLabels;
  }

  chart.data.labels = showDates;
  chart.data.datasets[0].data = showData;
  chart.data.datasets[0].pointBackgroundColor = showData.map((v, i) => {
    if (i === 0) return '#0ea5e9';
    return v >= showData[i - 1] ? '#00ff88' : '#ef4444';
  });
  chart.data.datasets[0].pointBorderColor = chart.data.datasets[0].pointBackgroundColor;
  chart.update();
}
</script>
</body>
</html>
