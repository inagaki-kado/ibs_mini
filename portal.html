<!DOCTYPE html>
<html lang="ja">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Noto Sans JP', 'sans-serif'],
            'orbitron': ['Orbitron', 'sans-serif'],
          },
          colors: {
            'cyber-bg': '#0a0e17',
            'cyber-dark': '#111827',
            'cyber-blue': '#0ea5e9',
            'cyber-green': '#22c55e',
            'cyber-pink': '#ec4899',
            'cyber-orange': '#f97316',
            'cyber-text': '#e2e8f0',
            'cyber-table-border': '#1f2937'
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0a0e17; color: #e2e8f0; }
    .font-sf { font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 1px; }
    
    /* ホバー時のネオン発光エフェクト */
    .card-blue:hover { box-shadow: 0 0 25px rgba(14, 165, 233, 0.5); transform: translateY(-5px) scale(1.02); border-color: #0ea5e9; }
    .card-pink:hover { box-shadow: 0 0 25px rgba(236, 72, 153, 0.5); transform: translateY(-5px) scale(1.02); border-color: #ec4899; }
    .card-green:hover { box-shadow: 0 0 25px rgba(34, 197, 94, 0.5); transform: translateY(-5px) scale(1.02); border-color: #22c55e; }
    .card-orange:hover { box-shadow: 0 0 25px rgba(249, 115, 22, 0.5); transform: translateY(-5px) scale(1.02); border-color: #f97316; }
    
    .card-transition { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
  </style>
</head>
